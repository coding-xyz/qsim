site_name: qsim 文档
site_description: qsim 使用指南、实现 Wiki 与自动生成 API 参考
repo_name: qsim
use_directory_urls: false

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

plugins:
  - search
  - gen-files:
      scripts:
        - docs/scripts/gen_ref_pages.py
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            show_root_toc_entry: false
            docstring_style: google

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - 首页: index.md
  - Wiki:
      - 入口: WIKI.md
      - 概览: wiki/overview.md
      - 电路层: wiki/circuit.md
      - 后端与模型: wiki/backend_model.md
      - 噪声与求解器: wiki/noise_engine.md
      - 可视化: wiki/visualization.md
      - IO 与会话: wiki/io_session.md
      - 差距清单: wiki/gaps.md
  - API 参考:
      - 总览: api/index.md
      - analysis: api/analysis.md
      - backend: api/backend.md
      - circuit: api/circuit.md
      - common: api/common.md
      - engines: api/engines.md
      - pulse: api/pulse.md
      - session: api/session.md
      - ui: api/ui.md
